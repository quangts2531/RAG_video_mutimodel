# ============================================================================
# docker-compose.yaml — Video RAG Chatbot Orchestration
#
# Services:
#   1. rag-api   : FastAPI backend (embeddings + Qdrant in-memory + SQLite)
#   2. ollama    : Ollama LLM server (Mistral model) — OPTIONAL
#
# Default mode uses host networking so the API container can reach
# the native Ollama running on localhost:11434 without reconfiguring it.
#
# Usage:
#   docker compose up -d                         # Start API (connects to native Ollama)
#   docker compose logs -f rag-api               # Stream API logs
#   docker compose down                          # Stop and remove
# ============================================================================

services:

  # ── RAG API Service ──────────────────────────────────────────────────────
  rag-api:
    build:
      context: .
      dockerfile: Dockerfile
    image: video-rag-api:1.0.0
    container_name: video-rag-api
    restart: unless-stopped

    # Host networking: container shares the host's network stack.
    # This lets the API reach native Ollama on localhost:11434 directly.
    # The API is accessible at http://localhost:8000 on the host.
    network_mode: host

    environment:
      # ── AI / Agent ──────────────────────────────────────────────
      - OLLAMA_HOST=${OLLAMA_HOST:-http://localhost:11434}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-all-MiniLM-L6-v2}
      - DOCUMENT_PATH=${DOCUMENT_PATH:-result_document.json}
      # ── Database ────────────────────────────────────────────────
      - DATABASE_URL=sqlite:////app/db/chatbot.db
      # ── Application ─────────────────────────────────────────────
      - APP_NAME=${APP_NAME:-Video RAG Chatbot API}
      - APP_VERSION=${APP_VERSION:-1.0.0}
      - DEBUG=${DEBUG:-false}
      - CORS_ORIGINS=${CORS_ORIGINS:-["*"]}
      # ── HuggingFace cache ───────────────────────────────────────
      - HF_HOME=/app/.hf_cache
      - TRANSFORMERS_CACHE=/app/.hf_cache
    volumes:
      # Knowledge base document (read-only)
      - ./result_document.json:/app/data/result_document.json:ro
      # SQLite database (persistent)
      - chatbot_db:/app/db
      # HuggingFace model cache (persistent — avoid re-downloading ~80MB)
      - hf_cache:/app/.hf_cache
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      start_period: 120s
      retries: 3

  # ── Ollama LLM Server (optional — for machines without native Ollama) ───
  # Uncomment this service if you need a containerized Ollama.
  # NOTE: Remove 'network_mode: host' from rag-api and use bridge networking
  #       with OLLAMA_HOST=http://ollama:11434 if using this service.
  #
  # ollama:
  #   image: ollama/ollama:0.5.13
  #   container_name: video-rag-ollama
  #   restart: unless-stopped
  #   ports:
  #     - "11434:11434"
  #   volumes:
  #     - ollama_data:/root/.ollama
  #   environment:
  #     - OLLAMA_HOST=0.0.0.0
  #   healthcheck:
  #     test: ["CMD", "ollama", "list"]
  #     interval: 15s
  #     timeout: 5s
  #     start_period: 30s
  #     retries: 5
  #   deploy:
  #     resources:
  #       reservations:
  #         devices:
  #           - driver: nvidia
  #             count: 1
  #             capabilities: [gpu]

# ── Named Volumes ──────────────────────────────────────────────────────────
volumes:
  chatbot_db:
    driver: local
    name: video-rag-chatbot-db
  hf_cache:
    driver: local
    name: video-rag-hf-cache
